<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#ff9f43" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="食快啲啦" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png" />
  <title>食快啲啦 Eatfaster</title>
  <style>
    :root {
      --paper: #fffdf8;
      --orange: #ff9f43;
      --orange-dark: #db6b12;
      --ink: #352a26;
      --muted: #8a746a;
      --cream: #fff4dc;
      --mint: #76d7c4;
      --shadow: 0 22px 52px rgba(111, 68, 22, .17);
      --soft-shadow: 0 12px 26px rgba(111, 68, 22, .12);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; height: 100%; }
    body {
      font-family: ui-rounded, "SF Pro Rounded", "PingFang HK", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 13% 11%, rgba(255, 218, 121, .70) 0 12%, transparent 13%),
        radial-gradient(circle at 90% 16%, rgba(118, 215, 196, .52) 0 10%, transparent 11%),
        radial-gradient(circle at 72% 88%, rgba(255, 107, 107, .23) 0 14%, transparent 15%),
        linear-gradient(160deg, #fff1cf 0%, #fff8ea 43%, #ffe1d2 100%);
      overflow: hidden;
    }
    button { font: inherit; cursor: pointer; border: 0; }
    img { display: block; max-width: 100%; }
    .app-shell {
      width: min(450px, 100%);
      height: 100svh;
      min-height: 100svh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 16px max(12px, env(safe-area-inset-bottom));
      display: flex;
    }
    .phone-card {
      width: 100%; height: 100%; min-height: 0;
      border-radius: 34px; overflow: hidden; position: relative;
      background: rgba(255, 253, 248, .86);
      border: 2px solid rgba(255,255,255,.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .screen { display: none; height: 100%; min-height: 0; padding: 24px 20px 20px; flex-direction: column; }
    .screen.active { display: flex; animation: popIn .24s ease both; }
    @keyframes popIn { from { opacity: 0; transform: translateY(10px) scale(.99); } to { opacity: 1; transform: none; } }
    .top-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .pill, .ghost-btn {
      border-radius: 999px; padding: 10px 14px; background: rgba(255,255,255,.78);
      color: var(--muted); box-shadow: none; font-weight: 900; font-size: 14px;
    }
    .ghost-btn { color: var(--ink); }
    .brand { text-align: center; margin-top: 12px; }
    .brand-badge {
      width: 116px; height: 116px; margin: 10px auto 14px; border-radius: 34px;
      background: linear-gradient(145deg, #ffcf6b, #ff8d40); display: grid; place-items: center;
      box-shadow: 0 18px 36px rgba(255, 143, 44, .32), inset 0 6px 14px rgba(255,255,255,.48); transform: rotate(-4deg);
    }
    .brand-badge img { width: 92px; height: 92px; }
    h1 { font-size: 42px; line-height: 1.02; margin: 0; letter-spacing: -1px; }
    .subtitle { font-size: 18px; color: var(--muted); margin: 9px 0 0; font-weight: 900; }
    .slogan { margin: 18px auto 0; padding: 13px 16px; border-radius: 22px; width: fit-content; background: #fff2d2; color: #9b560f; font-weight: 1000; box-shadow: inset 0 -2px 0 rgba(155,86,15,.08); }
    .hero-preview { margin: 22px auto 16px; min-height: 224px; width: 100%; border-radius: 30px; background: linear-gradient(180deg, #fffdf7 0%, #fff1d9 100%); box-shadow: var(--soft-shadow); display: grid; place-items: center; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .58; }
    .hero-pet { width: 178px; position: relative; animation: bob 2.2s ease-in-out infinite; filter: drop-shadow(0 18px 12px rgba(88,44,0,.13)); }
    @keyframes bob { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-8px) rotate(1deg); } }
    .goal-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    .goal-chip { border-radius: 16px; padding: 12px 8px; background: #fff; font-weight: 1000; color: var(--muted); box-shadow: none; }
    .goal-chip.active { color: #fff; background: var(--orange); }
    .primary-btn { width: 100%; border-radius: 26px; padding: 18px; background: linear-gradient(180deg, #ffb84d, #ff872e); color: white; font-size: 21px; font-weight: 1000; box-shadow: none; text-shadow: none; transition: transform .12s ease, filter .12s ease; }
    .primary-btn:active { transform: translateY(4px); box-shadow: none; }
    .bottom-actions { margin-top: auto; display: grid; gap: 12px; }
    .parent-note { margin: 14px 0 0; padding: 12px 14px; border-radius: 18px; color: var(--muted); background: rgba(255,255,255,.62); font-size: 13px; font-weight: 800; line-height: 1.45; }
    .section-title { margin: 16px 2px 8px; }
    .section-title h2 { font-size: 29px; margin: 0; letter-spacing: -.5px; }
    .section-title p { margin: 6px 0 0; color: var(--muted); font-weight: 800; }
    .grid { display: grid; gap: 12px; overflow-y: auto; min-height: 0; padding: 8px 2px 18px; margin: 4px -2px 0; }
    .scene-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .pet-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card { border: 2px solid transparent; border-radius: 24px; background: rgba(255,255,255,.78); box-shadow: none; padding: 9px; min-height: 128px; display: grid; justify-items: center; align-content: start; gap: 7px; overflow: hidden; position: relative; }
    .card.active { border-color: var(--orange); background: #fff5df; box-shadow: none; }
    .scene-thumb { height: 62px; width: 100%; object-fit: cover; border-radius: 16px; border: 2px solid rgba(53,42,38,.08); }
    .pet-thumb { width: 74px; height: 74px; object-fit: contain; filter: drop-shadow(0 8px 7px rgba(88,44,0,.11)); }
    .card-name { font-weight: 1000; font-size: 14px; text-align: center; }
    .card-trait { font-size: 11px; color: var(--muted); font-weight: 800; text-align: center; line-height: 1.25; }
    .game-header { display: grid; gap: 12px; }
    .progress-card { border-radius: 24px; background: rgba(255,255,255,.80); padding: 14px; box-shadow: 0 9px 22px rgba(111,68,22,.09); }
    .progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-weight: 1000; }
    .progress-num { color: var(--orange-dark); }
    .bar { height: 16px; border-radius: 999px; background: #f3dfbd; overflow: hidden; box-shadow: inset 0 2px 4px rgba(99,52,10,.13); }
    .bar-fill { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, #2ecc71, #f8d64e, #ff9f43); transition: width .34s ease; }
    .stage { flex: 1; min-height: 370px; margin: 14px 0; border-radius: 34px; background: #fff5dd; box-shadow: var(--soft-shadow); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .stage-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .84; }
    .stage::after { content:""; width: 250px; height: 36px; border-radius: 50%; background: rgba(92, 58, 26, .14); position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); filter: blur(1px); }
    .game-pet-name { position: absolute; top: 16px; left: 16px; font-weight: 1000; color: var(--muted); background: rgba(255,255,255,.74); padding: 8px 11px; border-radius: 999px; z-index: 6; }
    .scene-name { position: absolute; top: 16px; right: 16px; font-weight: 1000; color: var(--muted); background: rgba(255,255,255,.74); padding: 8px 11px; border-radius: 999px; z-index: 6; }
    .pet-stage { width: 208px; position: relative; z-index: 3; transform-origin: 50% 78%; filter: drop-shadow(0 18px 13px rgba(88,44,0,.16)); animation: bob 2.3s ease-in-out infinite; }
    .pet-stage.open { animation: openMouth .45s ease both; }
    .pet-stage.chew { animation: chew .42s ease-in-out 2; }
    @keyframes openMouth { 0% { transform: scale(1); } 60% { transform: scale(1.08) translateY(-5px); } 100% { transform: scale(1.04); } }
    @keyframes chew { 0%,100%{ transform: rotate(0deg) translateY(0); } 25%{ transform: rotate(-4deg) translateY(-4px) scale(1.03); } 75%{ transform: rotate(4deg) translateY(1px) scale(.99); } }
    .food { position: absolute; left: 50%; bottom: 12px; width: 150px; height: 150px; transform: translateX(-50%); display: grid; place-items: center; background: transparent; box-shadow: none; border-radius: 0; z-index: 5; padding: 0; filter: drop-shadow(0 12px 10px rgba(111,68,22,.16)); }
    .food img { width: 100%; height: 100%; object-fit: contain; }
    .food.fly { animation: flyToMouth .74s cubic-bezier(.2,.85,.25,1) forwards; }
    @keyframes flyToMouth { 0% { transform: translateX(-50%) translateY(0) scale(1) rotate(0deg); opacity: 1; } 72% { transform: translateX(-50%) translateY(-198px) scale(.66) rotate(24deg); opacity: 1; } 100% { transform: translateX(-50%) translateY(-208px) scale(.1) rotate(45deg); opacity: 0; } }
    .plate { position: absolute; bottom: 12px; left: 50%; width: 176px; height: 44px; transform: translateX(-50%); border-radius: 50%; background: linear-gradient(180deg, #fff, #f1dfc9); box-shadow: none; z-index: 4; }
    .message { min-height: 45px; padding: 12px 14px; border-radius: 20px; background: rgba(255,255,255,.74); color: var(--muted); text-align: center; font-weight: 1000; line-height: 1.3; box-shadow: 0 8px 18px rgba(111,68,22,.08); }
    .message.good { color: #1b9a5a; background: rgba(228, 255, 240, .86); }
    .message.warn { color: #c56700; background: rgba(255, 243, 218, .92); }
    .completion { position: absolute; inset: 0; display: none; place-items: center; padding: 24px; background: rgba(255, 247, 232, .92); backdrop-filter: blur(10px); z-index: 20; }
    .completion.show { display: grid; animation: popIn .25s ease both; }
    .completion-card { width: min(350px, 100%); border-radius: 34px; background: #fffdf7; padding: 18px 18px 22px; text-align: center; box-shadow: var(--shadow); border: 2px solid #fff; }
    .completion-pet { width: min(230px, 62vw); height: min(230px, 62vw); object-fit: contain; margin: 0 auto 4px; filter: drop-shadow(0 14px 12px rgba(88,44,0,.14)); animation: satisfiedBelly .9s ease both; }
    @keyframes satisfiedBelly { from { opacity: 0; transform: translateY(10px) scale(.9); } 70% { opacity: 1; transform: translateY(-2px) scale(1.04); } to { opacity: 1; transform: none; } }
    .completion-card h2 { font-size: 33px; margin: 8px 0 6px; }
    .completion-card p { color: var(--muted); font-weight: 900; }
    .confetti { pointer-events: none; position: absolute; inset: 0; overflow: hidden; z-index: 19; }
    .confetti i { position: absolute; width: 10px; height: 18px; border-radius: 4px; top: -30px; animation: fall 1.6s linear forwards; }
    @keyframes fall { to { transform: translateY(720px) rotate(520deg); opacity: .1; } }

    #startScreen { padding-top: 14px; padding-bottom: 14px; }
    #startScreen .brand { margin-top: 4px; }
    #startScreen .brand-badge { width: 84px; height: 84px; border-radius: 26px; margin: 6px auto 8px; }
    #startScreen .brand-badge img { width: 70px; height: 70px; }
    #startScreen h1 { font-size: 34px; }
    #startScreen .subtitle { font-size: 15px; margin-top: 4px; }
    #startScreen .slogan { margin-top: 10px; padding: 9px 13px; font-size: 14px; }
    #startScreen .hero-preview { min-height: 156px; height: 24vh; max-height: 190px; margin: 14px auto 10px; border-radius: 24px; }
    #startScreen .hero-pet { width: min(134px, 34vw); }
    #startScreen .goal-row { margin-top: 8px; }
    #startScreen .goal-chip { padding: 10px 8px; }
    #startScreen .primary-btn { padding: 15px 16px; font-size: 20px; }
    #startScreen .bottom-actions,
    #sceneScreen .bottom-actions,
    #petScreen .bottom-actions { margin-top: 10px; }
    #sceneScreen .grid,
    #petScreen .grid { padding-bottom: 8px; }
    #startScreen .parent-note { margin-top: 8px; padding: 9px 12px; font-size: 12px; line-height: 1.35; }
    button { box-shadow: none !important; text-shadow: none !important; }
    @media (max-height: 700px) {
      .app-shell { padding-top: 8px; padding-bottom: 8px; }
      .phone-card, .screen { min-height: calc(100vh - 16px); }
      #startScreen .top-row { transform: scale(.94); transform-origin: top center; }
      #startScreen .brand-badge { width: 72px; height: 72px; margin-bottom: 6px; }
      #startScreen .brand-badge img { width: 60px; height: 60px; }
      #startScreen h1 { font-size: 30px; }
      #startScreen .subtitle { display: none; }
      #startScreen .slogan { margin-top: 8px; padding: 8px 12px; }
      #startScreen .hero-preview { min-height: 132px; height: 22vh; margin: 10px auto 8px; }
      #startScreen .goal-chip { padding: 8px 6px; }
      #startScreen .primary-btn { padding: 13px 14px; }
      #startScreen .parent-note { font-size: 11px; padding: 8px 10px; }
    }

    @media (max-height: 760px) {
      h1 { font-size: 36px; }
      .hero-preview { min-height: 182px; margin-top: 16px; }
      .hero-pet { width: 148px; }
      .stage { min-height: 308px; }
      .pet-stage { width: 170px; }
      .card { min-height: 112px; padding: 7px; }
      .pet-thumb { width: 58px; height: 58px; }
      .scene-thumb { height: 50px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="phone-card" aria-live="polite">
      <div class="screen active" id="startScreen">
        <div class="top-row">
          <div class="pill">🍚 親子進餐小遊戲</div>
          <button class="ghost-btn" id="parentBtn">家長</button>
        </div>
        <div class="brand">
          <div class="brand-badge"><img src="assets/gemini/pets/cat.png" alt="胖胖貓 app icon"></div>
          <h1>食快啲啦</h1>
          <p class="subtitle">Eatfaster</p>
          <div class="slogan">食一啖，餵一啖！</div>
        </div>
        <div class="hero-preview">
          <img class="hero-bg" src="assets/gemini/backgrounds/home-table.png" alt="家中飯枱背景">
          <img class="hero-pet" src="assets/gemini/pets/cat.png" alt="胖胖貓">
        </div>
        <div class="goal-row" aria-label="選擇今餐目標">
          <button class="goal-chip" data-goal="10">10 啖</button>
          <button class="goal-chip active" data-goal="15">15 啖</button>
          <button class="goal-chip" data-goal="20">20 啖</button>
        </div>
        <div class="bottom-actions">
          <button class="primary-btn" id="startBtn">開始揀地方</button>
          <div class="parent-note">安全提示：請慢慢咀嚼，吞咗先撳。App 目標係建立進餐節奏，唔係鼓勵狼吞虎嚥。</div>
        </div>
      </div>

      <div class="screen" id="sceneScreen">
        <div class="top-row">
          <button class="ghost-btn" data-back="startScreen">← 返回</button>
          <div class="pill">第一步：揀背景</div>
        </div>
        <div class="section-title">
          <h2>揀食飯地方</h2>
          <p>9 個不同地方，令每餐都有新鮮感。</p>
        </div>
        <div class="grid scene-grid" id="sceneGrid"></div>
        <div class="bottom-actions">
          <button class="primary-btn" id="chooseSceneBtn">用呢個地方</button>
        </div>
      </div>

      <div class="screen" id="petScreen">
        <div class="top-row">
          <button class="ghost-btn" data-back="sceneScreen">← 換背景</button>
          <div class="pill">目標：<span id="chosenGoal">15</span> 啖</div>
        </div>
        <div class="section-title">
          <h2>揀一隻胖胖動物</h2>
          <p>9 隻可愛日系兒童漫畫感寵物。</p>
        </div>
        <div class="grid pet-grid" id="petGrid"></div>
        <div class="bottom-actions">
          <button class="primary-btn" id="choosePetBtn">用呢隻開餐！</button>
        </div>
      </div>

      <div class="screen" id="gameScreen">
        <div class="game-header">
          <div class="top-row">
            <button class="ghost-btn" data-back="petScreen">← 換寵物</button>
            <button class="ghost-btn" id="resetBtn">重新開始</button>
          </div>
          <div class="progress-card">
            <div class="progress-row">
              <span>今日進度</span>
              <span class="progress-num"><span id="biteCount">0</span>/<span id="goalCount">15</span> 啖</span>
            </div>
            <div class="bar"><div class="bar-fill" id="barFill"></div></div>
          </div>
        </div>
        <div class="stage">
          <img class="stage-bg-img" id="stageBg" src="assets/gemini/backgrounds/home-table.png" alt="背景">
          <div class="game-pet-name" id="gamePetName">胖胖貓</div>
          <div class="scene-name" id="gameSceneName">家中飯枱</div>
          <img class="pet-stage" id="gamePet" src="assets/gemini/pets/cat.png" alt="胖胖貓">
          <div class="food" id="food"><img id="foodImg" src="assets/gemini/foods/rice-bowl.png" alt="食物"></div>
          <div class="plate"></div>
        </div>
        <div class="message" id="message">食完一啖，吞咗先撳「餵寵物一啖！」</div>
        <div class="bottom-actions"><button class="primary-btn" id="feedBtn">餵寵物一啖！</button></div>
        <div class="confetti" id="confetti"></div>
        <div class="completion" id="completion">
          <div class="completion-card">
            <img class="completion-pet" id="completionPet" src="assets/gemini/pets/cat.png" alt="完成今餐寵物原圖">
            <h2>完成今餐！</h2>
            <p>寵物食飽飽啦，小朋友好叻！</p>
            <button class="primary-btn" id="againBtn">再玩一次</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const scenes = [
      { name: '家中飯枱', file: 'home-table', trait: '最溫暖' },
      { name: '日式小廚房', file: 'kitchen', trait: '叮叮香味' },
      { name: '公園野餐', file: 'picnic', trait: '陽光草地' },
      { name: '學校飯堂', file: 'school-canteen', trait: '同學一齊' },
      { name: '海邊餐墊', file: 'seaside', trait: '海風食飯' },
      { name: '森林小屋', file: 'forest-cabin', trait: '小動物朋友' },
      { name: '太空飯堂', file: 'space-canteen', trait: '飄浮晚餐' },
      { name: '電車月台', file: 'train-station', trait: '出發開餐' },
      { name: '糖果小屋', file: 'candy-house', trait: '甜甜夢境' }
    ];
    const pets = [
      { name: '胖胖貓', file: 'cat', trait: '最愛飯糰' },
      { name: '胖柴犬', file: 'dog', trait: '汪汪加油' },
      { name: '胖兔仔', file: 'rabbit', trait: '跳跳咀嚼' },
      { name: '胖熊貓', file: 'panda', trait: '慢慢吞吞' },
      { name: '胖企鵝', file: 'penguin', trait: '肚仔滑滑' },
      { name: '胖倉鼠', file: 'hamster', trait: '面珠脹卜卜' },
      { name: '胖水豚', file: 'capybara', trait: '超級淡定' },
      { name: '胖小象', file: 'elephant', trait: '鼻仔吸食物' },
      { name: '胖小恐龍', file: 'dino', trait: '咕嚕咕嚕' }
    ];
    const foods = [
      { name: '白飯', file: 'rice-bowl' }, { name: '紅蘿蔔', file: 'carrot' }, { name: '西蘭花', file: 'broccoli' },
      { name: '雞蛋', file: 'egg' }, { name: '飯糰', file: 'rice-ball' }, { name: '粟米', file: 'corn' },
      { name: '麵條', file: 'noodles' }, { name: '餃子', file: 'dumpling' }, { name: '雞髀', file: 'chicken' },
      { name: '蘋果', file: 'apple' }, { name: '魚', file: 'fish' }, { name: '菜心', file: 'greens' }
    ];
    const petSounds = {
      "cat": {
            "id": "cat-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖胖貓真實三聲喵喵",
            "src": "assets/sounds/pet-calls/cat-call.mp3"
      },
      "dog": {
            "id": "dog-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖柴犬真實三聲汪汪",
            "src": "assets/sounds/pet-calls/dog-call.mp3"
      },
      "rabbit": {
            "id": "rabbit-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖兔仔真實三聲吱吱",
            "src": "assets/sounds/pet-calls/rabbit-call.mp3"
      },
      "panda": {
            "id": "panda-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖熊貓真實三聲嗯嗯",
            "src": "assets/sounds/pet-calls/panda-call.mp3"
      },
      "penguin": {
            "id": "penguin-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖企鵝真實三聲咕咕",
            "src": "assets/sounds/pet-calls/penguin-call.mp3"
      },
      "hamster": {
            "id": "hamster-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖倉鼠真實三聲吱吱",
            "src": "assets/sounds/pet-calls/hamster-call.mp3"
      },
      "capybara": {
            "id": "capybara-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖水豚真實三聲近親吱吱",
            "src": "assets/sounds/pet-calls/capybara-call.mp3"
      },
      "elephant": {
            "id": "elephant-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖小象真實三聲噗嗚",
            "src": "assets/sounds/pet-calls/elephant-call.mp3"
      },
      "dino": {
            "id": "dino-call",
            "cat": "真實動物叫聲（三音節乾淨版）",
            "label": "胖小恐龍真實三聲鳥仔啾",
            "src": "assets/sounds/pet-calls/dino-call.mp3"
      }
};
    const sounds = Object.values(petSounds);

    const completionVoices = [
      { lang: 'yue-HK', label: '廣東話', text: '你好叻呀！今餐食得好好，慢慢咀嚼，好好照顧自己。', src: 'assets/voices/encourage-yue.mp3' },
      { lang: 'en-US', label: 'English', text: 'Well done! You finished your meal. I am so proud of you.', src: 'assets/voices/encourage-en.mp3' }
    ];
    const $ = id => document.getElementById(id);
    const asset = {
      pet: f => `assets/gemini/pets/${f}.png`,
      food: f => `assets/gemini/foods/${f}.png`,
      bg: f => `assets/gemini/backgrounds/${f}.png`
    };
    let goal = 15, bites = 0, isCooling = false, currentAudio = null;
    let selectedScene = scenes[0], selectedPet = pets[0];

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(id).classList.add('active');
    }
    function renderSelectable(gridId, items, type, onPick) {
      const grid = $(gridId);
      grid.innerHTML = items.map((item, idx) => {
        const imgClass = type === 'scene' ? 'scene-thumb' : 'pet-thumb';
        const src = type === 'scene' ? asset.bg(item.file) : asset.pet(item.file);
        return `<button class="card ${idx === 0 ? 'active' : ''}" data-idx="${idx}">
          <img class="${imgClass}" src="${src}" alt="${item.name}">
          <div class="card-name">${item.name}</div>
          <div class="card-trait">${item.trait}</div>
        </button>`;
      }).join('');
      grid.querySelectorAll('.card').forEach(btn => {
        btn.addEventListener('click', () => {
          grid.querySelectorAll('.card').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          onPick(items[Number(btn.dataset.idx)]);
          tinyPop();
        });
      });
    }
    function setMessage(text, mode='') { const msg = $('message'); msg.textContent = text; msg.className = 'message ' + mode; }
    function updateProgress() { $('biteCount').textContent = bites; $('barFill').style.width = Math.min(100, (bites / goal) * 100) + '%'; }
    function applyGame() {
      $('gamePetName').textContent = selectedPet.name;
      $('gameSceneName').textContent = selectedScene.name;
      $('gamePet').src = asset.pet(selectedPet.file);
      $('gamePet').alt = selectedPet.name;
      $('stageBg').src = asset.bg(selectedScene.file);
      $('stageBg').alt = selectedScene.name;
      $('goalCount').textContent = goal;
      updateProgress();
    }
    let audioCtx = null;
    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function tinyPop() {
      try {
        const ctx = ensureAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.frequency.value = 880; osc.type = 'triangle'; gain.gain.value = .025;
        osc.connect(gain).connect(ctx.destination); osc.start(); gain.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + .08); osc.stop(ctx.currentTime + .09);
      } catch(e) {}
    }
    function playSound(sound) {
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
      currentAudio = new Audio(sound.src);
      currentAudio.volume = .85;
      const p = currentAudio.play();
      if (p) p.catch(err => console.warn('Real sound playback failed:', sound.id, err));
      setTimeout(() => { if (currentAudio && !currentAudio.paused) currentAudio.pause(); }, 4000);
    }
    function speakEncouragementFallback(item) {
      if (!('speechSynthesis' in window)) return;
      const utter = new SpeechSynthesisUtterance(item.text);
      utter.lang = item.lang;
      utter.rate = .88;
      utter.pitch = 1.04;
      utter.volume = .9;
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v => v.lang === item.lang && /female|woman|jenny|xiaoxiao|hiu|maan|曉|女/i.test(v.name))
        || voices.find(v => v.lang === item.lang)
        || voices.find(v => v.lang && v.lang.startsWith(item.lang.slice(0,2)));
      if (preferred) utter.voice = preferred;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }
    function playCompletionVoice() {
      const item = completionVoices[Math.floor(Math.random() * completionVoices.length)];
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
      const voice = new Audio(item.src);
      voice.volume = .95;
      const p = voice.play();
      if (p) p.catch(err => {
        console.warn('Completion voice failed, using browser speech fallback:', item.label, err);
        speakEncouragementFallback(item);
      });
      return item;
    }
    function choosePetSound() {
      // 餵食聲效跟隨目前揀選的寵物，並使用真實動物錄音的可愛剪輯版。
      return petSounds[selectedPet.file] || petSounds.cat;
    }
    const chooseRandomSound = choosePetSound;
    const chooseDailySound = choosePetSound;
    function resetGame() {
      bites = 0; isCooling = false;
      $('completion').classList.remove('show'); $('confetti').innerHTML = '';
      updateProgress(); setMessage('食完一啖，吞咗先撳「餵寵物一啖！」');
    }
    function feed() {
      if (isCooling) { setMessage('慢慢咀嚼中……吞咗先可以再餵呀！', 'warn'); return; }
      if (bites >= goal) return;
      ensureAudioCtx(); isCooling = true;
      const food = foods[Math.floor(Math.random() * foods.length)];
      $('foodImg').src = asset.food(food.file); $('foodImg').alt = food.name;
      $('food').classList.remove('fly'); void $('food').offsetWidth; $('food').classList.add('fly');
      $('gamePet').classList.add('open');
      setMessage(`${selectedPet.name}張大口啦……`, 'good'); tinyPop();
      setTimeout(() => {
        $('gamePet').classList.remove('open'); $('gamePet').classList.add('chew');
        setMessage(`${selectedPet.name}叫一聲，幫你加油！`, 'good');
      }, 760);
      setTimeout(() => {
        $('gamePet').classList.remove('chew'); bites += 1; updateProgress();
        const sound = choosePetSound();
        playSound(sound);
        setMessage(bites >= goal ? '完成目標！' : '食完下一啖，再餵寵物啦！', bites >= goal ? 'good' : '');
        if (bites >= goal) celebrate();
      }, 1320);
      setTimeout(() => {
        if (bites < goal) setMessage('慢慢咀嚼，吞咗先可以再撳。');
        isCooling = false;
      }, 3000);
    }
    function celebrate() {
      $('completionPet').src = asset.pet(selectedPet.file);
      $('completionPet').alt = `完成今餐：${selectedPet.name}原圖`;
      const wrap = $('confetti'); wrap.innerHTML = '';
      const colors = ['#ff6b6b','#ff9f43','#feca57','#2ecc71','#48dbfb','#8e72ff'];
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('i');
        piece.style.left = Math.random() * 100 + '%'; piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = (Math.random() * .45) + 's'; piece.style.animationDuration = (1.2 + Math.random() * .9) + 's';
        wrap.appendChild(piece);
      }
      setTimeout(() => {
        $('completion').classList.add('show');
        playCompletionVoice();
      }, 900);
    }

    document.querySelectorAll('[data-back]').forEach(btn => btn.addEventListener('click', () => showScreen(btn.dataset.back)));
    document.querySelectorAll('.goal-chip').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.goal-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); goal = Number(btn.dataset.goal); $('chosenGoal').textContent = goal; tinyPop();
    }));
    $('startBtn').addEventListener('click', () => showScreen('sceneScreen'));
    $('chooseSceneBtn').addEventListener('click', () => showScreen('petScreen'));
    $('choosePetBtn').addEventListener('click', () => { resetGame(); applyGame(); showScreen('gameScreen'); });
    $('feedBtn').addEventListener('click', feed);
    $('resetBtn').addEventListener('click', resetGame);
    $('againBtn').addEventListener('click', () => { resetGame(); showScreen('startScreen'); });
    $('parentBtn').addEventListener('click', () => alert('家長模式草稿：之後可設定啖數、冷卻時間、聲效分類開關、放屁/廁所聲過濾。'));

    renderSelectable('sceneGrid', scenes, 'scene', v => selectedScene = v);
    renderSelectable('petGrid', pets, 'pet', v => selectedPet = v);
    applyGame();
    window.EatfasterDebug = { sounds, petSounds, completionVoices, playCompletionVoice, choosePetSound, chooseRandomSound, chooseDailySound };

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
